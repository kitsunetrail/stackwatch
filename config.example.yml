# StackWatch configuration (single self-contained file). Copy to config.yml to use.
# Setting at least one notify target is enough to run; omit the rest to use defaults.

schedule:
  # Time of day to run once daily, in local time (HH:MM).
  # Leave empty to switch to interval mode ("every 24h since startup").
  daily_at: "09:00"
  # Run one scan immediately on startup.
  run_on_start: true

scan:
  # Severities to report on. Defaults to HIGH and CRITICAL only.
  severity: [HIGH, CRITICAL]

notify:
  # Slack Incoming Webhook (sends a preformatted message).
  slack_webhook_url: ""
  # Generic webhook (POSTs structured JSON). The receiver can process it freely.
  generic_webhook_url: ""
  # Whether to send a message even when nothing is wrong. Defaults to false (notify only on findings).
  notify_on_clean: false

docker:
  # Path to docker.sock, mounted read-only.
  socket: "/var/run/docker.sock"
