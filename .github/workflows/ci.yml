name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go build ./...
      # Unit tests only: integration tests (real trivy + network) are gated
      # behind -short and excluded here to keep CI fast and hermetic.
      - run: go test ./... -short
